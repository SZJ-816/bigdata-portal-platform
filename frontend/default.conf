server {
    listen 80;
    server_name _;

    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_buffers 16 8k;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json application/javascript image/svg+xml application/wasm font/woff2 font/woff font/ttf;
    gzip_disable "msie6";
    gzip_proxied any;
    gzip_static on;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    resolver 127.0.0.11 valid=30s;
    set $backend http://bigdata-backend:8080;
    set $dashboard http://bigdata-dashboard:80;
    set $clickhouse http://bigdata-clickhouse:8123;

    open_file_cache max=2000 inactive=30s;
    open_file_cache_valid 60s;
    open_file_cache_min_uses 1;
    open_file_cache_errors off;

    client_body_buffer_size 16k;
    client_header_buffer_size 4k;
    client_max_body_size 2m;
    large_client_header_buffers 4 8k;

    keepalive_timeout 65;
    keepalive_requests 1000;
    reset_timedout_connection on;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    location /sw.js {
        root /usr/share/nginx/html;
        expires off;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # 大屏子路径 - 使用 ^~ 强制优先匹配
    location ^~ /bigscreen/ {
        rewrite ^/bigscreen/(.*) /$1 break;
        proxy_http_version 1.1;
        proxy_pass $dashboard;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection '';
        proxy_set_header Accept-Encoding "";
        proxy_set_header Origin "";

        proxy_buffering on;
        proxy_buffer_size 8k;
        proxy_buffers 8 16k;

        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
        proxy_send_timeout 5s;

        # 重写HTML中的资源路径，加上 /bigscreen/ 前缀
        sub_filter_once off;
        sub_filter 'src="/' 'src="/bigscreen/';
        sub_filter 'href="/' 'href="/bigscreen/';
        sub_filter 'action="/' 'action="/bigscreen/';
        sub_filter_types text/html text/css application/javascript application/json;

        # 避免浏览器缓存错误的MIME类型
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    location /assets/ {
        root /usr/share/nginx/html;
        expires 365d;
        add_header Cache-Control "public, immutable";
        add_header Vary "Accept-Encoding";
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    location /images/news/ {
        alias /usr/share/nginx/html/images/news/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Cache-Status $upstream_cache_status;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    location /images/ {
        root /usr/share/nginx/html;
        expires 30d;
        add_header Cache-Control "public";
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    location /favicon.svg {
        root /usr/share/nginx/html;
        expires 30d;
        add_header Cache-Control "public";
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    location = /bigscreen {
        return 301 /bigscreen/;
    }

    # ClickHouse查询代理 - 仅供大屏查询真实行为数据
    location /ch-query/ {
        proxy_http_version 1.1;
        proxy_pass $clickhouse;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Connection '';
        proxy_set_header X-ClickHouse-User "default";
        proxy_set_header X-ClickHouse-Key "bigdata123";
        proxy_connect_timeout 3s;
        proxy_read_timeout 10s;
        add_header Cache-Control "no-store, no-cache" always;
    }

    # 前端API路径 → 后端Controller路径映射
    location /api/news/channels {
        rewrite ^/api/news/channels /cms/article/channels break;
        proxy_http_version 1.1;
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection '';
    }

    location /api/news/hot {
        rewrite ^/api/news/hot /cms/article/list break;
        proxy_http_version 1.1;
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection '';
    }

    # /api/news (exact match, no trailing slash) → article list
    location = /api/news {
        rewrite ^/api/news /cms/article/list break;
        proxy_http_version 1.1;
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection '';
    }

    # /api/news/channel/{channelKey} → article list by channel key
    location /api/news/channel/ {
        rewrite ^/api/news/channel/(.*) /cms/article/channel-key/$1 break;
        proxy_http_version 1.1;
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection '';
    }

    # /api/news/{id}/comments → article comments
    location ~ ^/api/news/([^/]+)/comments$ {
        rewrite ^/api/news/([^/]+)/comments$ /community/comment/article/$1 break;
        proxy_http_version 1.1;
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection '';
    }

    location /api/news/ {
        rewrite ^/api/news/(.*) /cms/article/detail/$1 break;
        proxy_http_version 1.1;
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection '';
    }

    # /api/analytics (exact match) → statistics overview
    location = /api/analytics {
        rewrite ^/api/analytics /statistics/overview break;
        proxy_http_version 1.1;
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection '';
    }

    location /api/analytics/ {
        rewrite ^/api/analytics/(.*) /statistics/$1 break;
        proxy_http_version 1.1;
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection '';
    }

    location /api/channels {
        rewrite ^/api/channels /cms/channel/list break;
        proxy_http_version 1.1;
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection '';
    }

    location /api/ai/ {
        rewrite ^/api/ai/(.*) /ai/$1 break;
        proxy_http_version 1.1;
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_connect_timeout 30s;
    }

    location /api/users/ {
        rewrite ^/api/users/(.*) /users/$1 break;
        proxy_http_version 1.1;
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection '';
    }

    location /api/admin/ {
        rewrite ^/api/admin/(.*) /$1 break;
        proxy_http_version 1.1;
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection '';
    }

    # 图片上传和访问代理
    location /api/image/upload {
        rewrite ^/api/image/(.*) /image/$1 break;
        proxy_http_version 1.1;
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection '';
        client_max_body_size 10m;
    }

    location /api/image/proxy {
        rewrite ^/api/image/(.*) /image/$1 break;
        proxy_http_version 1.1;
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection '';
        proxy_read_timeout 15s;
    }

    location /image/ {
        proxy_http_version 1.1;
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection '';
        expires 30d;
        add_header Cache-Control "public";
    }

    location /api/behaviors {
        rewrite ^/api/behaviors /community/behavior break;
        proxy_http_version 1.1;
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection '';
    }

    location /api/ {
        proxy_http_version 1.1;
        proxy_pass $backend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header Accept-Encoding "";
        proxy_set_header Connection '';
        proxy_set_header Origin "";
        proxy_connect_timeout 3s;
        proxy_read_timeout 10s;
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;

        proxy_cache api_cache;
        proxy_cache_key "$scheme$request_method$host$request_uri";
        proxy_cache_valid 200 30s;
        proxy_cache_valid 404 5s;
        proxy_cache_valid any 5s;
        proxy_cache_lock on;
        proxy_cache_lock_timeout 5s;
        proxy_cache_use_stale error timeout updating;
        add_header X-Cache-Status $upstream_cache_status;
    }
}
