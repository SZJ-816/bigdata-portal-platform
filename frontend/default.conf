server {
    listen 80;
    server_name _;

    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_buffers 16 8k;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml+rss application/json application/javascript image/svg+xml application/wasm font/woff2 font/woff font/ttf;
    gzip_disable "msie6";
    gzip_proxied any;

    resolver 127.0.0.11 valid=30s;
    set $backend http://backend:8090;

    open_file_cache max=2000 inactive=30s;
    open_file_cache_valid 60s;
    open_file_cache_min_uses 1;
    open_file_cache_errors off;

    client_body_buffer_size 16k;
    client_header_buffer_size 4k;
    client_max_body_size 2m;
    large_client_header_buffers 4 8k;

    keepalive_timeout 65;
    keepalive_requests 1000;
    reset_timedout_connection on;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    location /assets/ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Vary "Accept-Encoding";
    }

    location /images/ {
        root /usr/share/nginx/html;
        expires 30d;
        add_header Cache-Control "public";
        add_header Vary "Accept-Encoding";
    }

    location /favicon.svg {
        root /usr/share/nginx/html;
        expires 30d;
        add_header Cache-Control "public";
    }

    location /api/ai/ {
        proxy_http_version 1.1;
        proxy_pass http://backend:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection '';
        proxy_set_header Accept-Encoding "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
        proxy_connect_timeout 30s;
        proxy_send_timeout 300s;
        chunked_transfer_encoding on;
    }

    location /api/image/ {
        proxy_http_version 1.1;
        proxy_pass http://backend:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Connection '';
        proxy_set_header Accept-Encoding "";
        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 8 32k;
        proxy_busy_buffers_size 64k;
        proxy_connect_timeout 5s;
        proxy_read_timeout 15s;
        proxy_send_timeout 5s;
    }

    location /api/ {
        proxy_http_version 1.1;
        proxy_pass http://backend:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Original-URI $request_uri;
        proxy_set_header Accept-Encoding "";
        proxy_set_header Connection '';
        proxy_connect_timeout 3s;
        proxy_read_timeout 10s;
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }
}
