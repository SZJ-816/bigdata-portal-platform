<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, minimum-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="description" content="科技新闻资讯平台 - 基于大数据实时分析技术构建" />
  <meta name="theme-color" content="#1a2a4a" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="TechNews" />
  <meta name="application-name" content="TechNews" />
  <meta name="msapplication-TileColor" content="#1a2a4a" />
  <meta name="msapplication-navbutton-color" content="#1a2a4a" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta http-equiv="Cache-Control" content="max-age=31536000" />
  <meta name="format-detection" content="telephone=no" />
  <title>TechNews - 科技新闻资讯平台</title>

  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="apple-touch-icon" href="/favicon.svg" />

  <link rel="preconnect" href="https://images.unsplash.com" crossorigin />
  <link rel="preconnect" href="https://api.midjourneyapi.io" crossorigin />
  <link rel="dns-prefetch" href="https://images.unsplash.com" />
  <link rel="dns-prefetch" href="https://api.midjourneyapi.io" />
  <link rel="dns-prefetch" href="https://integrate.api.nvidia.com" />

  <style>
    html {
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'Helvetica Neue', Helvetica, sans-serif;
      line-height: 1.5;
      color: #1a1a1a;
      background-color: #f5f5f5;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    #app {
      min-height: 100vh;
      background: #f5f5f5;
    }
    img {
      max-width: 100%;
      height: auto;
    }
    .loading-skeleton {
      animation: skeleton-pulse 1.5s ease-in-out infinite;
    }
    @keyframes skeleton-pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    @media (max-width: 768px) {
      html {
        font-size: 14px;
      }
      body {
        -webkit-text-size-adjust: 100%;
        -ms-text-size-adjust: 100%;
        font-size: 14px;
      }
    }
    @media (max-width: 480px) {
      html {
        font-size: 13px;
      }
    }
    @media (prefers-reduced-motion: reduce) {
      * {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
