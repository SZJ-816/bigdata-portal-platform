<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, minimum-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="description" content="科技新闻资讯平台 - 基于大数据实时分析技术构建" />
  <meta name="theme-color" content="#1a2a4a" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="TechNews" />
  <meta name="application-name" content="TechNews" />
  <meta name="msapplication-TileColor" content="#1a2a4a" />
  <meta name="msapplication-navbutton-color" content="#1a2a4a" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="format-detection" content="telephone=no" />
  <title>TechNews - 科技新闻资讯平台</title>

  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="apple-touch-icon" href="/favicon.svg" />
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#1a2a4a" />

  <style>
    html {
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'Helvetica Neue', Helvetica, sans-serif;
      line-height: 1.5;
      color: #1a1a1a;
      background-color: #f5f5f5;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }
    #app {
      min-height: 100vh;
      background: #f5f5f5;
    }
    img {
      max-width: 100%;
      height: auto;
    }
    @keyframes skeleton-shimmer {
      0% { background-position: -200% 0; }
      100% { background-position: 200% 0; }
    }
    .app-shell {
      min-height: 100vh;
      background: #f5f5f5;
    }
    .shell-header {
      height: 56px;
      background: #1a2a4a;
    }
    .shell-body {
      max-width: 1200px;
      margin: 0 auto;
      padding: 16px;
    }
    .shell-hero {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
    }
    .shell-hero-main {
      flex: 2;
      height: 280px;
      border-radius: 8px;
      background: linear-gradient(90deg, #e8e8e8 25%, #f0f0f0 50%, #e8e8e8 75%);
      background-size: 200% 100%;
      animation: skeleton-shimmer 1.5s ease-in-out infinite;
    }
    .shell-hero-side {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .shell-hero-item {
      flex: 1;
      border-radius: 8px;
      background: linear-gradient(90deg, #e8e8e8 25%, #f0f0f0 50%, #e8e8e8 75%);
      background-size: 200% 100%;
      animation: skeleton-shimmer 1.5s ease-in-out infinite;
    }
    .shell-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 280px;
      gap: 16px;
    }
    .shell-card {
      height: 80px;
      border-radius: 8px;
      background: linear-gradient(90deg, #e8e8e8 25%, #f0f0f0 50%, #e8e8e8 75%);
      background-size: 200% 100%;
      animation: skeleton-shimmer 1.5s ease-in-out infinite;
    }
    @media (max-width: 768px) {
      html { font-size: 14px; }
      body { -webkit-text-size-adjust: 100%; -ms-text-size-adjust: 100%; font-size: 14px; }
      .shell-hero { flex-direction: column; }
      .shell-hero-main { height: 180px; }
      .shell-hero-side { flex-direction: row; }
      .shell-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 480px) {
      html { font-size: 13px; }
    }
    @media (prefers-reduced-motion: reduce) {
      * { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="app-shell">
      <div class="shell-header"></div>
      <div class="shell-body">
        <div class="shell-hero">
          <div class="shell-hero-main"></div>
          <div class="shell-hero-side">
            <div class="shell-hero-item"></div>
            <div class="shell-hero-item"></div>
            <div class="shell-hero-item"></div>
          </div>
        </div>
        <div class="shell-grid">
          <div class="shell-card"></div>
          <div class="shell-card"></div>
          <div class="shell-card"></div>
        </div>
      </div>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
