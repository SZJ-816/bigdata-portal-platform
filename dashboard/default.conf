server {
    listen 80;
    server_name _;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;
    gzip_vary on;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # 登录认证
    location /api/auth/ {
        rewrite ^/api/auth/(.*) /auth/$1 break;
        proxy_http_version 1.1;
        proxy_pass http://bigdata-backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 新闻管理 → cms/article
    location /api/news/channels {
        rewrite ^/api/news/channels /cms/article/channels break;
        proxy_http_version 1.1;
        proxy_pass http://bigdata-backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/news/channel/ {
        rewrite ^/api/news/channel/(.*) /cms/article/channel-key/$1 break;
        proxy_http_version 1.1;
        proxy_pass http://bigdata-backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location = /api/news {
        rewrite ^/api/news /cms/article/list break;
        proxy_http_version 1.1;
        proxy_pass http://bigdata-backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/news/ {
        rewrite ^/api/news/(.*) /cms/article/detail/$1 break;
        proxy_http_version 1.1;
        proxy_pass http://bigdata-backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 用户管理 → system/user
    location /api/users/ {
        rewrite ^/api/users/(.*) /system/user/$1 break;
        proxy_http_version 1.1;
        proxy_pass http://bigdata-backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 评论管理 → community/comment
    location /api/comments/ {
        rewrite ^/api/comments/(.*) /community/comment/$1 break;
        proxy_http_version 1.1;
        proxy_pass http://bigdata-backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 数据分析
    location /api/analytics/ {
        rewrite ^/api/analytics/(.*) /statistics/$1 break;
        proxy_http_version 1.1;
        proxy_pass http://bigdata-backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 行为上报
    location /api/behaviors {
        rewrite ^/api/behaviors /community/behavior break;
        proxy_http_version 1.1;
        proxy_pass http://bigdata-backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 图片上传 → image/upload
    location /api/image/upload {
        rewrite ^/api/image/(.*) /image/$1 break;
        proxy_http_version 1.1;
        proxy_pass http://bigdata-backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        client_max_body_size 10m;
    }

    # 图片代理 → image/proxy
    location /api/image/proxy {
        rewrite ^/api/image/(.*) /image/$1 break;
        proxy_http_version 1.1;
        proxy_pass http://bigdata-backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 15s;
    }

    # 图片访问 → image/
    location /image/ {
        proxy_http_version 1.1;
        proxy_pass http://bigdata-backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # AI模型配置 → ai/config
    location /api/ai/config/ {
        rewrite ^/api/ai/config/(.*) /ai/config/$1 break;
        proxy_http_version 1.1;
        proxy_pass http://bigdata-backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 通用兜底
    location /api/ {
        rewrite ^/api/(.*) /$1 break;
        proxy_http_version 1.1;
        proxy_pass http://bigdata-backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        root /usr/share/nginx/html;
        expires 7d;
        add_header Cache-Control "public, no-transform";
    }

    location ~* \.html$ {
        root /usr/share/nginx/html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires 0;
    }
}
