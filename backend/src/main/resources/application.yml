server:
  port: 8090
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  datasource:
    url: jdbc:mysql://mysql:3306/bigdata_portal?useSSL=false&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root123
    driver-class-name: com.mysql.cj.jdbc.Driver
  mail:
    host: ${MAIL_HOST:smtp.qq.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
    default-encoding: UTF-8
  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
    serialization:
      write-dates-as-timestamps: true
  kafka:
    bootstrap-servers: kafka:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      group-id: portal-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

mybatis:
  type-aliases-package: com.bigdata.portal.entity
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    com.bigdata.portal: debug

image:
  generator:
    enabled: true
    api-url: https://api.midjourneyapi.io/v2/imagine
    api-key: ${IMAGE_GENERATOR_API_KEY:demo-key}
    fallback-url: https://picsum.photos/seed/{seed}/800/400

ai:
  nvidia:
    base-url: https://integrate.api.nvidia.com/v1
    api-key: ${AI_NVIDIA_API_KEY:-your-nvidia-api-key}
    model: meta/llama-3.1-8b-instruct
